<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Animal Match-Up | Classroom English Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded', sans-serif;
            background: linear-gradient(145deg, #f9e7b2 0%, #f5d0a9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }

        .game-container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.2), inset 0 2px 4px rgba(255, 255, 255, 0.8);
            padding: 30px 20px 40px 20px;
            border: 5px solid white;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            color: #2d4b2c;
            text-shadow: 4px 4px 0 #ffb347;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .sub-title {
            font-size: 1.4rem;
            background: #ffefc0;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 40px;
            color: #3e2b1b;
            font-weight: bold;
            border: 3px solid #fba0a0;
            margin-bottom: 30px;
            box-shadow: 0 5px 0 #c59a6b;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #a2d6f9;
            border: 4px solid #3e7ba7;
            border-radius: 60px;
            padding: 12px 25px;
            margin-bottom: 30px;
            color: #1e3b5a;
            font-weight: bold;
            font-size: 1.8rem;
            box-shadow: 0 6px 0 #2b5f8a;
        }

        .score-box {
            background: #fef9e3;
            border-radius: 30px;
            padding: 8px 30px;
            border: 3px solid #fbb84b;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-box {
            background: #fef2c1;
            border-radius: 30px;
            padding: 12px 20px;
            font-size: 1.6rem;
            border: 3px dashed #ff8a5c;
            margin: 15px 0 25px 0;
            min-height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #964b00;
        }

        .game-board {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .animals-area {
            flex: 2 1 300px;
            background: #e6d5b8;
            border-radius: 50px;
            padding: 25px 15px;
            border: 5px solid #bc8f4b;
            box-shadow: inset 0 0 0 4px #fbe49b, 0 10px 0 #7b5834;
        }

        .words-area {
            flex: 1 1 220px;
            background: #b8d9c6;
            border-radius: 50px;
            padding: 25px 15px;
            border: 5px solid #558b6e;
            box-shadow: inset 0 0 0 4px #d9ffd9, 0 10px 0 #2d6742;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 20px;
            text-decoration: underline wavy #f35f5f;
        }

        /* Animal image cards */
        .animal-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .animal-card {
            background: white;
            width: 130px;
            padding: 18px 8px 12px 8px;
            border-radius: 40px 40px 30px 30px;
            border: 4px solid #966f4a;
            box-shadow: 0 8px 0 #6b4f37, 0 12px 16px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            text-align: center;
        }

        .animal-card.selected {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #6b4f37, 0 8px 12px rgba(0,0,0,0.2);
            border-color: #fcca4b;
            background: #fff7d7;
        }

        .animal-emoji {
            font-size: 5rem;
            line-height: 1;
            filter: drop-shadow(4px 6px 0 #c9a57b);
            margin-bottom: 8px;
        }

        .animal-label {
            background: #fccc6e;
            border-radius: 30px;
            padding: 6px 5px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #2b1b0e;
            border: 2px solid #b4621a;
            visibility: hidden;     /* hide real label — students must read word card */
        }

        /* Word tiles */
        .word-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: stretch;
        }

        .word-tile {
            background: #fee48e;
            border: 4px solid #af6d3a;
            border-radius: 50px;
            padding: 18px 8px;
            font-size: 2.2rem;
            font-weight: bold;
            text-transform: capitalize;
            color: #402812;
            box-shadow: 0 7px 0 #896130, 0 8px 12px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.1s;
            text-align: center;
            letter-spacing: 1px;
        }

        .word-tile.selected {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #896130, 0 8px 12px rgba(0,0,0,0.1);
            background: #ffd966;
            border-color: #f0a500;
        }

        .word-tile.matched, .animal-card.matched {
            opacity: 0.6;
            filter: grayscale(0.6);
            pointer-events: none;
            border-color: #41a341;
            box-shadow: 0 4px 0 #2d7a2d;
            transform: translateY(4px);
            transition: 0.2s;
            cursor: default;
        }

        .word-tile.matched {
            background: #a8d08d;
            text-decoration: line-through 2px #0f5c0f;
        }

        .animal-card.matched .animal-emoji {
            filter: drop-shadow(2px 4px 0 #558b6e);
        }

        .reset-btn {
            background: #ffa07a;
            border: none;
            font-size: 2rem;
            padding: 15px 40px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0 #b64516;
            border: 4px solid #ffe28c;
            box-shadow: 0 9px 0 #b64926, 0 5px 15px black;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.05s linear;
            font-family: inherit;
        }

        .reset-btn:active {
            transform: translateY(7px);
            box-shadow: 0 2px 0 #b64926, 0 5px 12px black;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 1.3rem;
            color: #3b2a17;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .word-tile { font-size: 1.8rem; }
            .animal-emoji { font-size: 3.8rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐘 ANIMAL MATCH-UP 🦒</h1>
        <div class="sub-title">👆 Click an animal → then a word 👆</div>

        <!-- Score & message area -->
        <div class="score-row">
            <span>⭐</span>
            <span class="score-box" id="scoreDisplay">0 / 6</span>
            <span>⭐</span>
        </div>
        <div class="message-box" id="messageDisplay">
            Find the pairs!
        </div>

        <!-- Main game board -->
        <div class="game-board">
            <!-- Left side: ANIMALS (pictures) -->
            <div class="animals-area">
                <div class="section-title">🐶 ANIMALS</div>
                <div class="animal-grid" id="animalGrid">
                    <!-- dynamically filled from JS, but we will build with static data and JS update -->
                </div>
            </div>

            <!-- Right side: WORDS -->
            <div class="words-area">
                <div class="section-title">📝 WORDS</div>
                <div class="word-list" id="wordList"></div>
            </div>
        </div>

        <!-- Reset button -->
        <button class="reset-btn" id="resetGameBtn">🔄 Play Again! 🔄</button>
        <div class="footer-note">✨ tap an animal, then a word to match ✨</div>
    </div>

    <script>
        (function() {
            // ----- GAME DATA -----
            const animalData = [
                { id: 'elephant', emoji: '🐘', name: 'elephant' },
                { id: 'lion', emoji: '🦁', name: 'lion' },
                { id: 'giraffe', emoji: '🦒', name: 'giraffe' },
                { id: 'monkey', emoji: '🐒', name: 'monkey' },
                { id: 'zebra', emoji: '🦓', name: 'zebra' },
                { id: 'crocodile', emoji: '🐊', name: 'crocodile' }
            ];

            // words are the same (names) but we shuffle them at start
            let wordItems = animalData.map(a => ({ id: a.id, word: a.name, matched: false }));

            // Game state
            let animals = animalData.map(animal => ({
                ...animal,
                matched: false
            }));

            let words = []; // will be shuffled copy of wordItems

            let selectedAnimalId = null;      // store currently selected animal (id)
            let matchedCount = 0;
            const totalPairs = animalData.length;

            // DOM elements
            const animalGridEl = document.getElementById('animalGrid');
            const wordListEl = document.getElementById('wordList');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const messageDisplay = document.getElementById('messageDisplay');
            const resetBtn = document.getElementById('resetGameBtn');

            // Helper: shuffle array (Fisher-Yates)
            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // Reset / initialise game
            function initGame() {
                // reset animals
                animals = animalData.map(animal => ({
                    ...animal,
                    matched: false
                }));

                // shuffle words and reset matched status
                words = shuffleArray(wordItems.map(item => ({ ...item, matched: false })));

                selectedAnimalId = null;
                matchedCount = 0;
                updateScore();
                setMessage('Find the pairs! Tap an animal...');
                renderGame();
            }

            // Update score display
            function updateScore() {
                scoreDisplay.textContent = `${matchedCount} / ${totalPairs}`;
                if (matchedCount === totalPairs) {
                    setMessage('🎉 WELL DONE! You matched all animals! 🎉');
                }
            }

            function setMessage(msg) {
                messageDisplay.textContent = msg;
            }

            // Clear any selected animal (visual)
            function clearSelectedAnimal() {
                selectedAnimalId = null;
                // remove 'selected' class from all animal cards
                document.querySelectorAll('.animal-card').forEach(card => {
                    card.classList.remove('selected');
                });
            }

            // Clear selected word class
            function clearSelectedWord() {
                document.querySelectorAll('.word-tile').forEach(t => t.classList.remove('selected'));
            }

            // When an animal is clicked
            function handleAnimalClick(animalId) {
                // find animal
                const animal = animals.find(a => a.id === animalId);
                if (!animal || animal.matched) {
                    setMessage('🙅 This animal is already matched!');
                    return; // already matched
                }

                // toggle: if same animal clicked again -> deselect
                if (selectedAnimalId === animalId) {
                    clearSelectedAnimal();
                    setMessage('👆 Animal deselected. Pick again!');
                    return;
                }

                // otherwise, change selection
                // remove selected class from all animals
                clearSelectedAnimal();
                // add class to new animal card
                const animalCard = document.querySelector(`.animal-card[data-animal-id="${animalId}"]`);
                if (animalCard) animalCard.classList.add('selected');

                selectedAnimalId = animalId;
                setMessage(`✅ Selected ${animal.name}. Now tap the matching word.`);
                // also remove any highlighted word
                clearSelectedWord();
            }

            // When a word is clicked
            function handleWordClick(wordId) {
                // find word object
                const word = words.find(w => w.id === wordId);
                if (!word || word.matched) {
                    setMessage('⛔ This word is already matched!');
                    return;
                }

                // if no animal selected, ask to pick animal first
                if (!selectedAnimalId) {
                    setMessage('👆 First click on an animal picture!');
                    return;
                }

                // check if selected animal is already matched (safety)
                const selectedAnimal = animals.find(a => a.id === selectedAnimalId);
                if (!selectedAnimal || selectedAnimal.matched) {
                    // this case shouldn't happen if UI consistent, but just in case
                    clearSelectedAnimal();
                    setMessage('🔄 Please select a different animal.');
                    return;
                }

                // Check if word matches the selected animal (by id)
                if (word.id === selectedAnimalId) {
                    // MATCH!
                    word.matched = true;
                    selectedAnimal.matched = true;

                    // Mark animal card as matched (disable)
                    const animalCard = document.querySelector(`.animal-card[data-animal-id="${selectedAnimalId}"]`);
                    if (animalCard) {
                        animalCard.classList.add('matched');
                        animalCard.classList.remove('selected');
                    }

                    // Mark word tile as matched
                    const wordTile = document.querySelector(`.word-tile[data-word-id="${wordId}"]`);
                    if (wordTile) {
                        wordTile.classList.add('matched');
                        wordTile.classList.remove('selected');
                    }

                    matchedCount++;
                    updateScore();

                    // clear selection
                    clearSelectedAnimal();

                    if (matchedCount === totalPairs) {
                        setMessage('🎉 CONGRATULATIONS! You are a champion! 🎉');
                    } else {
                        setMessage('✔️ Great match! Keep going!');
                    }
                } else {
                    // wrong match
                    setMessage(`❌ Oops! "${word.word}" is not the right word for ${selectedAnimal.name}. Try again!`);
                    // deselect animal? you may keep it selected or deselect? more user-friendly to keep selected.
                    // but flash a red message, and keep animal selected (so they can try again)
                    // Also briefly mark word red? we'll just message.
                }
                // clear any temporary word selection style
                clearSelectedWord();
            }

            // Renders both panels from arrays
            function renderGame() {
                // Render animals
                animalGridEl.innerHTML = '';
                animals.forEach(animal => {
                    const card = document.createElement('div');
                    card.className = `animal-card ${animal.matched ? 'matched' : ''}`;
                    card.dataset.animalId = animal.id;
                    card.innerHTML = `
                        <div class="animal-emoji">${animal.emoji}</div>
                        <div class="animal-label">${animal.name}</div>
                    `;
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (animal.matched) {
                            setMessage('Already matched!');
                            return;
                        }
                        handleAnimalClick(animal.id);
                    });
                    animalGridEl.appendChild(card);
                });

                // Render words (shuffled)
                wordListEl.innerHTML = '';
                words.forEach(word => {
                    const tile = document.createElement('div');
                    tile.className = `word-tile ${word.matched ? 'matched' : ''}`;
                    tile.dataset.wordId = word.id;
                    tile.textContent = word.word;
                    tile.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (word.matched) {
                            setMessage('Word already matched!');
                            return;
                        }
                        handleWordClick(word.id);
                    });
                    wordListEl.appendChild(tile);
                });

                // If an animal was selected before rerender (e.g. after reset) clear memory
                // but reset already clears selected. good.
            }

            // Reset button event
            resetBtn.addEventListener('click', () => {
                initGame();
            });

            // start game
            initGame();

        })();
    </script>
</body>
</html>
